name: GitHub Pagesへ公開

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: 公開ファイルを準備
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを読み込む
        uses: actions/checkout@v6

      - name: Node.jsを準備する
        uses: actions/setup-node@v7
        with:
          node-version: "24"

      - name: GitHub Pagesを構成する
        uses: actions/configure-pages@v6

      - name: 公開ファイルをビルドする
        run: node scripts/build.mjs

      - name: 公開ファイルをアップロードする
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: GitHub Pagesへ反映
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 公開する
        id: deployment
        uses: actions/deploy-pages@v5
